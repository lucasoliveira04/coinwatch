services:
  db:
    image: postgres:16-alpine
    container_name: coinwatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coinwatch
      POSTGRES_PASSWORD: coinwatch
      POSTGRES_DB: coinwatch
    ports:
      - "5433:5432"
    volumes:
      - coinwatch-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coinwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  coinwatch-db-data: